name: Backend CI
#
on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Use Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run tests
        run: npm test

  registry:
    needs: test
    permissions:
      contents: read
      packages: write
    uses: oss-slu/oss_cicd_automation/.github/workflows/Reusable_Docker.yml@main
    with:
      image_name: civickit-backend
      dockerfile: backend/Dockerfile
      context: backend
    secrets: inherit